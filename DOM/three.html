<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>learning DOM</title>
</head>
<body style="background-color:black; color: white;">
    <ul class="list">
        <li>javasript</li>
    </ul>
</body>
<script>
    // creating new element in list
    function addlang(langName){
        const newli=document.createElement('li')
         newli.innerHTML=`${langName}`
         document.querySelector('.list').appendChild(newli)
        
    }
    addlang('python');
    addlang('mojo');
    // edit 
    // const li = document.querySelector("li:nth-child(2)")
    // li.outerHTML=('<li>html</li>')
    const li = document.createElement('li')
    li.textContent="ruby"
    const oldli=document.querySelector("li:nth-child(2)")
    oldli.replaceWith(li)

    // remove
    // const list=document.querySelector("li:last-child")
    // list.remove()
</script>
</html>
