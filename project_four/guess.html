<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <link rel="stylesheet" href="guess.css">
</head>
<body style="background-color: black; color: white;">
    <h2 class="banner1">Number Guessing Game</h2>
    <h2 class="banner2">Enter a number between 1 to 100</h2>
    <div class="container">
        <form class="form">
        <label for="guess">Enter a Number</label>
        <input type="text" id="guess">
        <button type="submit" id="submit"> Submit</button>
        </form>
    </div>
    <div class="result">
        <p class="message"></p>
        <p></p>Previous Guess :- <span  class="previousGuess"></span></p>
        <p>Guess Remaining :- <span class="remaining">10</span></p>
    </div>
    <div class="newGame">
        <button type="submit" class="new">New Game</button>
    </div>
    <script src="guess.js"></script>
</body>
</html>
